name: Build & Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - go.mod
      - go.sum
      - Dockerfile
      - "**/*.go"

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}
            ${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:latest

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          service_account: github-action-update-cloudrun@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          workload_identity_provider: projects/${{ secrets.WIP_PROJECT_ID }}/locations/global/workloadIdentityPools/github-actions/providers/my-repo

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ vars.SERVICE_NAME }} \
            --platform=managed \
            --image=${{ vars.DOCKER_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }} \
            --region=${{ vars.REGION }}
